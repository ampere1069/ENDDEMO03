<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#00010a">
  <title>感謝聆聽 | Thank You — V60</title>

  <!--
    ── Design DNA: Aurora Sanctum ─────────────────────────────────
    Concept  : Northern lights rising from below · stillness of the
               polar night · text lit by aurora from beneath
    Palette  : Deep space #00010a · Aurora green-teal #1acc80 ·
               Aurora violet #9933cc · White flare #ffffff
    Typography: Noto Serif TC 400 (balanced CJK — neither heavy nor
               whisper-thin, carved in starlight)
               + Josefin Sans 100 italic (ultra-geometric thin Latin)
    Effects  : Vanilla WebGL FBM curtain shader (ported from 21st.dev
               Three.js component) — aurora rises from bottom of screen,
               mouse creates bright flare in the aurora field
    Animation: GSAP timeline repeat:-1 (infinite loop per project rules)
               Reveal → 4s hold → fade out → reset → repeat
    Composition: Characters lit from below by aurora glow;
               text-shadow y-offset simulates upward light
    ──────────────────────────────────────────────────────────────
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400&family=Josefin+Sans:ital,wght@0,100;1,100&display=swap" rel="stylesheet">

  <!-- GSAP 3.13.0 — cdnjs CDN, no local vendor folder -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>

  <style>
    /* ── Design Tokens ──────────────────────────────────────────── */
    :root {
      --ink:        #ffffff;
      --ink-aurora: rgba(210,255,235,0.80);  /* aurora-tinted white */
      --ink-dim:    rgba(255,255,255,0.18);
      --aurora-g:   rgba(26,204,128,0.62);   /* aurora green */
      --aurora-v:   rgba(153,51,204,0.22);   /* aurora violet */
      --font-cjk:   'Noto Serif TC', 'Noto Serif', serif;
      --font-lat:   'Josefin Sans', sans-serif;
      --font-mono:  'Courier New', monospace;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #00010a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── WebGL aurora canvas (layer 0) ──────────────────────────── */
    #gl {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; display: block;
    }

    /* ── Radial vignette — darkens edges, opens center (layer 1) ── */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 75% 65% at 50% 44%,
          rgba(0,1,10,0.00)  0%,
          rgba(0,1,10,0.58) 52%,
          rgba(0,1,10,0.94) 100%),
        linear-gradient(180deg,
          rgba(0,1,10,0.55) 0%,
          transparent       18%,
          transparent       60%,
          rgba(0,1,10,0.30) 100%);
    }

    /* ── Film grain (layer 2) ────────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 210 210' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='.6'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    /* ── Main stage (layer 3) ────────────────────────────────────── */
    main {
      position: relative; z-index: 3;
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(1.5rem, 5vw, 5rem);
      text-align: center;
      /* Shift text slightly above center — aurora glows beneath */
      padding-bottom: 14vh;
    }

    /* ── Chinese title ───────────────────────────────────────────── */
    .title-row {
      display: flex;
      gap: clamp(0.02em, 0.4vw, 0.07em);
      justify-content: center;
      align-items: baseline;
      margin-bottom: clamp(1.8rem, 4.5vh, 3.8rem);
    }

    .char {
      display: inline-block;
      font-family: var(--font-cjk);
      font-weight: 400;
      font-size: clamp(4.5rem, 18vw, 16rem);
      line-height: 0.92;
      color: var(--ink);
      letter-spacing: -0.01em;
      /* Aurora lit from below: y-positive shadow = light source underneath */
      text-shadow:
        0  6px  90px var(--aurora-g),
        0 10px 180px rgba(26,204,128,0.22),
        0  4px  30px var(--aurora-v);
    }

    /* ── Aurora-tinted hairline ──────────────────────────────────── */
    .hairline {
      width: clamp(50px, 10vw, 140px);
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        var(--aurora-g) 35%,
        var(--aurora-g) 65%,
        transparent);
      margin: 0 auto clamp(1.8rem, 4.5vh, 3.8rem);
      transform-origin: center;
    }

    /* ── English subtitle ────────────────────────────────────────── */
    .en-title {
      font-family: var(--font-lat);
      font-weight: 100;
      font-style: italic;
      font-size: clamp(1.1rem, 3.0vw, 2.6rem);
      letter-spacing: 0.06em;
      color: var(--ink-aurora);
      text-transform: uppercase;
      line-height: 1;
    }

    /* ── Footer micro-label ──────────────────────────────────────── */
    .footer-label {
      position: absolute;
      bottom: clamp(1.2rem, 3vh, 2.5rem);
      left: 0; right: 0; text-align: center;
      font-family: var(--font-mono);
      font-size: clamp(0.46rem, 0.72vw, 0.60rem);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    /* ── Reduced motion ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .char, .hairline, .en-title, .footer-label {
        opacity: 1 !important;
        clip-path: none !important;
        transform: none !important;
        letter-spacing: inherit !important;
        visibility: visible !important;
      }
    }

    /* ── Mobile ──────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .title-row { gap: 0.02em; }
      main { padding-bottom: 10vh; }
    }
  </style>
</head>
<body>

  <!-- Layer 0: Aurora Borealis WebGL shader -->
  <canvas id="gl" aria-hidden="true"></canvas>

  <!-- Layer 1: Vignette -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- Layer 2: Film grain -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Layer 3: Content -->
  <main>
    <div class="title-row" role="heading" aria-level="1" aria-label="感謝聆聽">
      <span class="char" aria-hidden="true">感</span>
      <span class="char" aria-hidden="true">謝</span>
      <span class="char" aria-hidden="true">聆</span>
      <span class="char" aria-hidden="true">聽</span>
    </div>

    <div class="hairline" aria-hidden="true"></div>

    <p class="en-title" lang="en">Thank You</p>

    <p class="footer-label" aria-hidden="true">2026 &nbsp;&middot;&nbsp; Presentation End</p>
  </main>


  <script>
    /* ════════════════════════════════════════════════════════════════
       Aurora Borealis WebGL Shader
       Ported from 21st.dev / Three.js component to pure vanilla WebGL.
       FBM (Fractional Brownian Motion) curtain + real-time mouse flare.
       No Three.js, no runtime fetch calls, no external dependencies.

       Aurora rises from the BOTTOM of screen — the polar ground glows,
       text floats above in the dark sky lit from below.
    ════════════════════════════════════════════════════════════════ */
    (function initAurora() {
      var canvas = document.getElementById("gl");
      var gl = canvas.getContext("webgl") ||
               canvas.getContext("experimental-webgl");
      if (!gl) return;

      /* ── Vertex shader ──────────────────────────────────────── */
      var VERT = [
        "attribute vec2 a_position;",
        "void main() {",
        "  gl_Position = vec4(a_position, 0.0, 1.0);",
        "}"
      ].join("\n");

      /* ── Fragment shader: FBM aurora curtain ────────────────── */
      var FRAG = [
        "precision highp float;",
        "uniform vec2  iResolution;",
        "uniform float iTime;",
        "uniform vec2  iMouse;",
        "",
        "float random(vec2 st) {",
        "  return fract(sin(dot(st.xy,",
        "    vec2(12.9898, 78.233))) * 43758.5453123);",
        "}",
        "",
        "float noise(vec2 p) {",
        "  vec2 i = floor(p);",
        "  vec2 f = fract(p);",
        "  vec2 u = f * f * (3.0 - 2.0 * f);",
        "  return mix(",
        "    mix(random(i),               random(i + vec2(1.0,0.0)), u.x),",
        "    mix(random(i + vec2(0.0,1.0)), random(i + vec2(1.0,1.0)), u.x),",
        "    u.y);",
        "}",
        "",
        "float fbm(vec2 p) {",
        "  float v = 0.0; float a = 0.5;",
        "  for (int i = 0; i < 5; i++) {",
        "    v += a * noise(p);",
        "    p *= 2.0; a *= 0.5;",
        "  }",
        "  return v;",
        "}",
        "",
        "void main() {",
        "  /* Normalize: center (0,0), -0.5..+0.5 range */",
        "  vec2 uv    = (gl_FragCoord.xy - 0.5 * iResolution.xy) / iResolution.y;",
        "  vec2 mouse = (iMouse          - 0.5 * iResolution.xy) / iResolution.y;",
        "  float t    = iTime * 0.2;",
        "",
        "  /* Aurora curtain — stronger at bottom (low y), fades upward */",
        "  vec2 p = uv;",
        "  p.y += 0.5;",
        "  float f       = fbm(vec2(p.x * 2.0, p.y + t));",
        "  float curtain = smoothstep(0.1, 0.5, f) * (1.0 - p.y);",
        "  curtain       = clamp(curtain, 0.0, 1.0);",
        "",
        "  /* Mouse flare — brightest where cursor hovers the aurora */",
        "  float d     = length(uv - mouse);",
        "  float flare = smoothstep(0.3, 0.0, d);",
        "",
        "  /* Green-teal base, violet accent toward top of curtain */",
        "  vec3 c1    = vec3(0.10, 0.82, 0.52);  /* aurora green  */",
        "  vec3 c2    = vec3(0.62, 0.12, 0.82);  /* aurora violet */",
        "  vec3 fc    = vec3(1.0);",
        "  vec3 color = mix(c1, c2, p.y * 0.8) * curtain;",
        "  color += fc * flare * curtain * 2.2;",
        "",
        "  gl_FragColor = vec4(color, 1.0);",
        "}"
      ].join("\n");

      /* ── Compile helper ─────────────────────────────────────── */
      function compile(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          gl.deleteShader(s); return null;
        }
        return s;
      }

      var prog = gl.createProgram();
      gl.attachShader(prog, compile(gl.VERTEX_SHADER,   VERT));
      gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
      gl.useProgram(prog);

      /* ── Full-screen quad (TRIANGLE_STRIP, 4 verts) ─────────── */
      var buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER,
        new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
        gl.STATIC_DRAW);

      var aPos = gl.getAttribLocation(prog, "a_position");
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      /* ── Uniform locations ──────────────────────────────────── */
      var uRes   = gl.getUniformLocation(prog, "iResolution");
      var uTime  = gl.getUniformLocation(prog, "iTime");
      var uMouse = gl.getUniformLocation(prog, "iMouse");

      /* ── Mouse / touch tracking ─────────────────────────────── */
      var mouse = { x: -100, y: -100 };

      window.addEventListener("mousemove", function(e) {
        mouse.x = e.clientX;
        /* Flip Y: WebGL y=0 is bottom, CSS y=0 is top */
        mouse.y = canvas.height - e.clientY;
      });

      window.addEventListener("touchmove", function(e) {
        var tt = e.touches[0];
        mouse.x = tt.clientX;
        mouse.y = canvas.height - tt.clientY;
      }, { passive: true });

      /* ── Resize ─────────────────────────────────────────────── */
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform2f(uRes, canvas.width, canvas.height);
      }
      window.addEventListener("resize", resize);
      resize();

      /* ── Render loop ────────────────────────────────────────── */
      var t0 = performance.now();
      (function loop() {
        var t = (performance.now() - t0) * 0.001;
        gl.uniform1f(uTime,  t);
        gl.uniform2f(uMouse, mouse.x, mouse.y);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(loop);
      })();
    })();


    /* ════════════════════════════════════════════════════════════════
       GSAP — V60 Aurora Sanctum  ·  INFINITE LOOP
       Phase 1: reveal (R→L wipe, hairline, en-title letter-expand)
       Phase 2: hold 4 s at full visibility
       Phase 3: fade out all elements
       Phase 4: pause 0.8 s
       Phase 5: instant reset → go to phase 1 (repeat: -1)
    ════════════════════════════════════════════════════════════════ */
    function reveal() {
      if (window._v60done) return;
      window._v60done = true;

      /* ── Initial states ── */
      gsap.set(".char",         { clipPath: "inset(0% 0% 0% 105%)", autoAlpha: 1 });
      gsap.set(".hairline",     { scaleX: 0, autoAlpha: 0, transformOrigin: "center" });
      gsap.set(".en-title",     { autoAlpha: 0, letterSpacing: "0.06em" });
      gsap.set(".footer-label", { autoAlpha: 0 });

      /* ── Infinite-loop master timeline ── */
      var tl = gsap.timeline({ repeat: -1, defaults: { ease: "expo.out" } });

      tl
        /* ─ Phase 1: Reveal ─ */

        /* Characters wipe in R→L (left-edge inset 105%→0%) */
        .to(".char", {
            clipPath: "inset(0% 0% 0% 0%)",
            duration: 1.25,
            stagger: 0.20
          })

        /* Hairline grows from center */
        .to(".hairline", {
            scaleX: 1, autoAlpha: 1,
            duration: 0.90, ease: "power3.inOut"
          }, "-=0.55")

        /* English: fade + letter-spacing expansion */
        .to(".en-title", {
            autoAlpha: 1, letterSpacing: "0.46em",
            duration: 1.10, ease: "power3.out"
          }, "-=0.55")

        /* Footer drifts in */
        .to(".footer-label", {
            autoAlpha: 1, duration: 0.90
          }, "-=0.60")

        /* ─ Phase 2: Hold ─ */
        .to({}, { duration: 4.2 })

        /* ─ Phase 3: Fade out ─ */
        .to([".char", ".hairline", ".en-title", ".footer-label"], {
            autoAlpha: 0, duration: 1.0, ease: "power2.inOut",
            stagger: 0.06
          })

        /* ─ Phase 4: Pause ─ */
        .to({}, { duration: 0.9 })

        /* ─ Phase 5: Instant reset for next loop ─ */
        .set(".char",         { clipPath: "inset(0% 0% 0% 105%)", autoAlpha: 1 })
        .set(".hairline",     { scaleX: 0, autoAlpha: 0 })
        .set(".en-title",     { autoAlpha: 0, letterSpacing: "0.06em" })
        .set(".footer-label", { autoAlpha: 0 });
    }

    /* ── Double-trigger guard (readyState + setTimeout safety net) ── */
    if (document.readyState === "complete") {
      reveal();
    } else {
      window.addEventListener("load", reveal, { once: true });
      setTimeout(reveal, 1800);
    }
  </script>
</body>
</html>
